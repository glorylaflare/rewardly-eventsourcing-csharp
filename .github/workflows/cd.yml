name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

env:
  DOTNET_VERSION: 8.0.x
  BUILD_CONFIGURATION: Release

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API dependencies
        run: dotnet restore src/Rewardly.Api/Rewardly.Api.csproj

      - name: Publish API
        run: dotnet publish src/Rewardly.Api/Rewardly.Api.csproj -c $BUILD_CONFIGURATION -o ./artifacts/publish /p:UseAppHost=false

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-output
          path: ./artifacts/publish

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-output
          path: ./package-content

      - name: Create deployment package
        run: |
          cd package-content
          zip -r ../rewardly-api-${{ github.sha }}.zip .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ./rewardly-api-${{ github.sha }}.zip